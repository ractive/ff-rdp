<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>E1 fixture — ChunkLoadError</title>
</head>
<body>
<h1>App shell</h1>
<p id="status">loading chunk...</p>
<script>
// Simulate dynamic import() of a chunk that no longer exists.
fetch('/static/chunks/main.abc123.js')
  .then(r => {
    if (!r.ok) {
      const err = new Error('Loading chunk main failed (status ' + r.status + ')');
      err.name = 'ChunkLoadError';
      throw err;
    }
    return r.text();
  })
  .then(() => {
    document.getElementById('status').textContent = 'chunk-loaded';
  })
  .catch(err => {
    console.error(err.name + ': ' + err.message);
    document.getElementById('status').textContent = 'chunk-failed';
  });
</script>
</body>
</html>
