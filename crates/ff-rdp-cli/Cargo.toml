[package]
name = "ff-rdp-cli"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
readme = "../../README.md"
keywords = ["cli", "firefox", "rdp", "devtools"]
categories = ["command-line-utilities"]
description = "CLI for Firefox Remote Debugging Protocol"

[[bin]]
name = "ff-rdp"
path = "src/main.rs"

[dependencies]
ff-rdp-core = { workspace = true }
anyhow = { workspace = true }
base64 = { workspace = true }
clap = { workspace = true }
jaq-core = { workspace = true }
jaq-json = { workspace = true }
jaq-std = { workspace = true }
regex = { workspace = true }
chrono = { workspace = true }
dirs = { workspace = true }
fs2 = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
getrandom = { workspace = true }
tempfile = { workspace = true }
url = { workspace = true }
ureq = { workspace = true }
include_dir = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

[target.'cfg(unix)'.dependencies]
libc = { workspace = true }

[target.'cfg(windows)'.dependencies]
windows-sys = { workspace = true }

[[test]]
name = "e2e"
path = "tests/e2e/main.rs"

[[test]]
name = "playbook_evals"
path = "tests/playbook_evals.rs"

[[test]]
name = "live_61l"
path = "tests/live_61l.rs"

[[test]]
name = "live_daemon_watch_targets"
path = "tests/live_daemon_watch_targets.rs"

[[test]]
name = "live_network_default_watcher"
path = "tests/live_network_default_watcher.rs"

[[test]]
name = "live_daemon_heavy_spa"
path = "tests/live_daemon_heavy_spa.rs"

[[test]]
name = "live_network_headers"
path = "tests/live_network_headers.rs"

[[test]]
name = "error_shapes"
path = "tests/error_shapes.rs"

[dev-dependencies]
ff-rdp-core = { workspace = true }
serde_json = { workspace = true }
tempfile = { workspace = true }
dirs = { workspace = true }
jsonschema = "0.27"

[target.'cfg(unix)'.dev-dependencies]
libc = { workspace = true }

[target.'cfg(windows)'.dev-dependencies]
windows-sys = { workspace = true }

[lints]
workspace = true
