name: CI

on:
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Allow test binary through Windows Firewall
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-NetFirewallRule -DisplayName "ff-rdp-e2e" -Direction Inbound -Action Allow -Protocol TCP -LocalPort 1024-65535 -ErrorAction SilentlyContinue

      - name: Run tests
        timeout-minutes: 10
        run: cargo test --workspace
      - name: Verify CLI runs
        run: cargo run -p ff-rdp-cli -- --help

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install cargo-audit and cargo-deny
        uses: taiki-e/install-action@a1df9120380005ebdc788c62449b841b205541dd # v2
        with:
          tool: cargo-audit,cargo-deny
      - name: cargo audit
        run: cargo audit
      - name: cargo deny check
        run: cargo deny check

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # nightly
        with:
          toolchain: nightly
          # libFuzzer requires the gnu (non-musl) toolchain; address-sanitiser
          # is incompatible with musl libc.  Pin explicitly so the runner's
          # default target (which may be musl on some ubuntu-latest images)
          # does not cause a link failure.  See fuzz/README.md.
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: fuzz
      - name: Install cargo-fuzz
        uses: taiki-e/install-action@a1df9120380005ebdc788c62449b841b205541dd # v2
        with:
          tool: cargo-fuzz
      - name: Fuzz transport_recv_from (60 s)
        working-directory: fuzz
        run: cargo +nightly fuzz run --target x86_64-unknown-linux-gnu transport_recv_from seeds/transport_recv_from -- -max_total_time=60
      - name: Fuzz parse_page_map_str (60 s)
        working-directory: fuzz
        run: cargo +nightly fuzz run --target x86_64-unknown-linux-gnu parse_page_map_str seeds/parse_page_map_str -- -max_total_time=60
      - name: Fuzz parse_script_file (60 s)
        working-directory: fuzz
        run: cargo +nightly fuzz run --target x86_64-unknown-linux-gnu parse_script_file seeds/parse_script_file -- -max_total_time=60
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: fuzz-artifacts
          path: |
            fuzz/artifacts/
            fuzz/corpus/

  discipline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep
      - name: Build xtask
        run: cargo build -p xtask
      - name: Check dead primitives
        run: cargo run -p xtask -- check-dead-primitives --since origin/main
      - name: Check TODO annotations
        run: cargo run -p xtask -- check-todo-annotations --since origin/main
      - name: Check daemon lock recovery
        run: cargo run -p xtask -- check-daemon-locks
      - name: Check discipline regression (mirror + replay baselines)
        # The skill scripts at ~/.claude/skills/ralph-loop are not present in
        # CI runners, so the mirror-sync half is automatically skipped. The
        # replay baselines run against the in-repo tools/ralph-loop/scripts
        # copy and validate that iter-61v fails / iter-61t passes.
        run: cargo run -p xtask -- check-discipline-regression
