name: CI

on:
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Allow test binary through Windows Firewall
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-NetFirewallRule -DisplayName "ff-rdp-e2e" -Direction Inbound -Action Allow -Protocol TCP -LocalPort 1024-65535 -ErrorAction SilentlyContinue

      - name: Run tests
        timeout-minutes: 10
        run: cargo test --workspace
      - name: Verify CLI runs
        run: cargo run -p ff-rdp-cli -- --help

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install cargo-audit and cargo-deny
        uses: taiki-e/install-action@a1df9120380005ebdc788c62449b841b205541dd # v2
        with:
          tool: cargo-audit,cargo-deny
      - name: cargo audit
        run: cargo audit
      - name: cargo deny check
        run: cargo deny check

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # nightly
        with:
          toolchain: nightly
          # libFuzzer requires the gnu (non-musl) toolchain; address-sanitiser
          # is incompatible with musl libc.  Pin explicitly so the runner's
          # default target (which may be musl on some ubuntu-latest images)
          # does not cause a link failure.  See fuzz/README.md.
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: fuzz
      - name: Install cargo-fuzz
        uses: taiki-e/install-action@a1df9120380005ebdc788c62449b841b205541dd # v2
        with:
          tool: cargo-fuzz
      - name: Fuzz transport_recv_from (60 s)
        working-directory: fuzz
        run: cargo +nightly fuzz run --target x86_64-unknown-linux-gnu transport_recv_from seeds/transport_recv_from -- -max_total_time=60
      - name: Fuzz parse_page_map_str (60 s)
        working-directory: fuzz
        run: cargo +nightly fuzz run --target x86_64-unknown-linux-gnu parse_page_map_str seeds/parse_page_map_str -- -max_total_time=60
      - name: Fuzz parse_script_file (60 s)
        working-directory: fuzz
        run: cargo +nightly fuzz run --target x86_64-unknown-linux-gnu parse_script_file seeds/parse_script_file -- -max_total_time=60
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: fuzz-artifacts
          path: |
            fuzz/artifacts/
            fuzz/corpus/

  discipline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep
      - name: Build xtask
        run: cargo build -p xtask
      - name: Check dead primitives
        run: cargo run -p xtask -- check-dead-primitives --since origin/main
      - name: Check TODO annotations
        run: cargo run -p xtask -- check-todo-annotations --since origin/main
      - name: Check daemon lock recovery
        run: cargo run -p xtask -- check-daemon-locks
      - name: Check discipline regression (mirror + replay baselines)
        # The skill scripts at ~/.claude/skills/ralph-loop are not present in
        # CI runners, so the mirror-sync half is automatically skipped. The
        # replay baselines run against the in-repo tools/ralph-loop/scripts
        # copy and validate that iter-61v fails / iter-61t passes.
        run: cargo run -p xtask -- check-discipline-regression
      - name: Check actor ↔ kb sync
        # Fails if an actor .rs file under crates/ff-rdp-core/src/actors/ was
        # changed without a matching kb/rdp/actors/*.md update in the same diff.
        run: cargo run -p xtask -- check-actor-kb-sync --since origin/main
      - name: Check firefox_refs (no-op in CI — no Firefox checkout)
        # check-firefox-refs validates line ranges against the local Firefox checkout.
        # CI runners don't have the checkout, so we run only against a plan that has
        # no firefox_refs (iter-73 itself), which is accepted silently.
        run: >
          cargo run -p xtask -- check-firefox-refs
          kb/iterations/iteration-73-spec-fidelity-gates.md
      - name: Check oneway conformance (no-op in CI — no Firefox checkout)
        # check-oneway-conformance requires FF_RDP_FIREFOX_PATH; it skips gracefully
        # when neither the env var nor ~/devel/firefox are present.
        run: cargo run -p xtask -- check-oneway-conformance

  # iter-75c: PR-time smoke that proves `gh attestation verify` will succeed
  # against a freshly built artifact. Builds the Linux x86_64 CLI, runs
  # actions/attest-build-provenance against it, then re-runs the same
  # `gh attestation verify <file> --owner ractive` invocation that release
  # consumers use. Catches mis-wired permissions, OIDC token scope changes,
  # or a Sigstore transparency-log regression before they reach a tagged
  # release. Skipped on fork PRs (no OIDC token).
  verify-attestation:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build ff-rdp-cli (release)
        run: cargo build -p ff-rdp-cli --release --target x86_64-unknown-linux-gnu
      - name: Package artifact
        run: |
          set -euo pipefail
          tar czf ff-rdp-x86_64-unknown-linux-gnu.tar.gz \
            -C target/x86_64-unknown-linux-gnu/release ff-rdp
          ls -la ff-rdp-x86_64-unknown-linux-gnu.tar.gz
      - name: Attest build provenance
        id: attest
        uses: actions/attest-build-provenance@619dbb2e03d83bf3e96250d6a4257f4a551a1b80 # v2.6.0
        with:
          subject-path: ff-rdp-x86_64-unknown-linux-gnu.tar.gz
      - name: Verify attestation end-to-end
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Offline path: verify the bundle the attest action just produced.
          # Catches any local mis-config (wrong subject digest, malformed
          # bundle) before the transparency log is involved.
          gh attestation verify ff-rdp-x86_64-unknown-linux-gnu.tar.gz \
            --owner ractive \
            --bundle "${{ steps.attest.outputs.bundle-path }}"
          # Online path: round-trip through GitHub's attestation API the
          # same way a release consumer does. This is the actual smoke
          # check — if this fails on a no-op PR, the release would too.
          gh attestation verify ff-rdp-x86_64-unknown-linux-gnu.tar.gz \
            --owner ractive
