name: Live Tests

# iter-117 Theme B (pre-landed): no longer runs per-PR. The lane was
# permanently red from environmental runner failures (~27 min/PR, advisory,
# no signal — see DEC-022 context and iter-114 Results); the real live gate
# is local and enforced per-iteration via check-iteration-ready. Runs
# on-demand, at release, and as a weekly drift canary instead.
on:
  workflow_dispatch:
  release:
    types: [published]
  schedule:
    - cron: "0 3 * * 1"

env:
  CARGO_TERM_COLOR: always
  FF_RDP_LIVE_TESTS: "1"
  FF_RDP_LIVE_NETWORK_TESTS: "1"

jobs:
  live-tests:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install Firefox
        uses: browser-actions/setup-firefox@8058e910ee76e74bb76b7b2e5b61a55b3a65ed78 # v1.7.2

      - name: Verify Firefox installation
        run: firefox --version

      - name: Build ff-rdp
        run: cargo build -p ff-rdp-cli

      - name: Run live tests
        # `--no-fail-fast` so a failure in an early-alphabetical test binary no
        # longer masks every later binary (the exact masking bug iter-106 was
        # created to fix: `cargo test` otherwise stops the whole invocation on
        # the first failing binary, hiding late-alphabetical live tests from CI).
        # `--test-threads=1` because the live tests share one Firefox/daemon per
        # runner — concurrent tests steal each other's browser state and flake.
        run: cargo test --workspace --no-fail-fast -- --include-ignored --test-threads=1

      # iter-117 Theme B follow-up: the former "Run dogfood-script gate (iter-*
      # branches only)" step was removed here.  Its `if:` guard keyed on a
      # per-PR event context that is unset under all three current triggers
      # (workflow_dispatch, release, schedule) after the Theme B pre-landing
      # swapped the `on:` block away from the per-PR trigger.  The guard
      # therefore always evaluated false and the step was silently dead.  The
      # dogfood-script gate is already enforced pre-merge locally by
      # `check-iteration-ready`'s `lint-dogfood-script` sub-check (see
      # CLAUDE.md), so the CI step is redundant as well as dead — dropped rather
      # than rewritten.
