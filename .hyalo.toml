dir = "kb"

[views]

[views.stale-in-progress]
fields = ["tasks"]
properties = ["status=in-progress"]

[views.missing-status]
properties = ["!status"]

[views.missing-type]
properties = ["!type"]

[views.orphans]
fields = ["backlinks"]
orphan = true

[views.completed-with-todos]
fields = ["tasks"]
properties = ["status=completed"]
task = "todo"
