# Configuration for cargo-deny — https://embarkstudios.github.io/cargo-deny/
#
# Run locally: cargo deny check
# Runs automatically in the release workflow as a quality gate.

[advisories]
ignore = []
# iter-75 Hg-2: refuse to ship a release if a dependency has been yanked from
# crates.io.  Yanks usually flag a security issue or a broken build, so they
# should fail CI rather than silently downgrade to a warning.
yanked = "deny"

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
